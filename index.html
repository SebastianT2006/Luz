<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi niña Luz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Georgia', serif }

        .garden {
            width: 100%; height: 100vh; position: relative;
            background: linear-gradient(180deg, #06040f 0%, #0d0820 40%, #140a2e 70%, #0a0618 100%)
        }

        .aurora { position: absolute; top: 0; left: 0; width: 100%; height: 55%; pointer-events: none; overflow: hidden }
        .aurora::before {
            content: ''; position: absolute; top: -60px; left: 10%; width: 80%; height: 300px;
            background: radial-gradient(ellipse at 50% 50%, rgba(180,80,200,.12) 0%, rgba(120,40,180,.06) 45%, transparent 70%);
            animation: auroraPulse 8s ease-in-out infinite
        }
        .aurora::after {
            content: ''; position: absolute; top: 20px; left: 25%; width: 50%; height: 200px;
            background: radial-gradient(ellipse at 50% 50%, rgba(220,130,255,.08) 0%, transparent 65%);
            animation: auroraPulse 11s ease-in-out infinite reverse
        }
        @keyframes auroraPulse {
            0%,100% { opacity:.6; transform:scaleX(1) }
            50% { opacity:1; transform:scaleX(1.08) }
        }

        .stars { position: absolute; inset: 0; pointer-events: none }
        .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--d,3s) ease-in-out infinite }
        .star.big { width: 3px; height: 3px; box-shadow: 0 0 4px 1px rgba(255,255,255,.5) }
        .star.sm { width: 1.5px; height: 1.5px }
        @keyframes twinkle {
            0%,100% { opacity:.2; transform:scale(.8) }
            50% { opacity:1; transform:scale(1.3) }
        }

        .moon {
            position: absolute; top: clamp(30px,6vh,60px); right: clamp(5%,8%,12%);
            border-radius: 50%; width: clamp(36px,7vw,52px); height: clamp(36px,7vw,52px);
            background: radial-gradient(circle at 38% 38%, #f0e8ff 0%, #d4b8f0 60%, #a878d8 100%);
            box-shadow: 0 0 20px 6px rgba(200,160,255,.22), 0 0 60px 20px rgba(200,160,255,.08);
            animation: moonGlow 6s ease-in-out infinite
        }
        @keyframes moonGlow {
            0%,100% { box-shadow: 0 0 20px 6px rgba(200,160,255,.22), 0 0 60px 20px rgba(200,160,255,.08) }
            50% { box-shadow: 0 0 28px 10px rgba(200,160,255,.32), 0 0 80px 30px rgba(200,160,255,.14) }
        }
        .moon-crater { position: absolute; border-radius: 50%; background: rgba(160,100,220,.3) }

        .title {
            position: absolute; top: clamp(40px,8vh,72px); left: 0; width: 100%;
            text-align: center; z-index: 10; animation: fadeDown .8s ease-out both; padding: 0 16px
        }
        @keyframes fadeDown {
            from { opacity:0; transform:translateY(-18px) }
            to { opacity:1; transform:translateY(0) }
        }
        .title h1 {
            font-size: clamp(36px,10vw,72px); font-weight: 300;
            letter-spacing: clamp(6px,2vw,12px); color: #e8c8ff;
            text-shadow: 0 0 40px rgba(200,130,255,.35), 0 2px 4px rgba(0,0,0,.4)
        }
        .title p {
            margin-top: 8px; font-size: clamp(11px,2.8vw,17px);
            letter-spacing: clamp(2px,1.5vw,6px); color: #d4a8f8; opacity:.85;
            font-style: italic; max-width: 90vw; margin-left: auto; margin-right: auto
        }
        .title .author {
            font-size: clamp(10px,2vw,14px); letter-spacing: clamp(2px,1.5vw,5px);
            color: #b888e8; opacity:.6; font-style: normal; margin-top: 6px
        }
        .divider {
            margin: 14px auto 0; width: 120px; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200,140,255,.5), transparent)
        }

        .scene {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: min(760px,100vw); height: min(560px,58vh); z-index: 5
        }
        @media (max-width:600px) {
            .scene { height: 72vh }
            .title { top: clamp(20px,4vh,40px) }
        }

        .ground-glow {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 80px;
            background: radial-gradient(ellipse at 50% 100%, rgba(160,80,220,.15) 0%, transparent 70%);
            pointer-events: none
        }

        @keyframes float {
            0%,100% { transform: translateY(0) }
            50% { transform: translateY(-11px) }
        }
        @keyframes floatCenter {
            0%,100% { transform: translateY(0) scale(1.12) }
            50% { transform: translateY(-13px) scale(1.12) }
        }

        @media (max-width:480px) {
            .title { top: clamp(28px,6vh,50px) }
            .divider { width: 80px; margin-top: 10px }
            .scene { height: min(480px,55vh) }
        }
        @media (max-height:500px) and (orientation:landscape) {
            .title { top: 10px }
            .title h1 { font-size: clamp(22px,6vw,40px) }
            .title p { margin-top: 4px; font-size: clamp(10px,2vw,13px) }
            .divider { margin-top: 6px }
            .scene { height: 75vh }
            .moon { top: 8px; width: 28px; height: 28px }
        }
    </style>
</head>
<body>
<div class="garden">
    <div class="aurora"></div>

    <div class="moon">
        <div class="moon-crater" style="width:9px;height:9px;top:14px;left:28px"></div>
        <div class="moon-crater" style="width:6px;height:6px;top:30px;left:16px"></div>
        <div class="moon-crater" style="width:4px;height:4px;top:22px;left:22px"></div>
    </div>

    <div class="stars" id="stars"></div>

    <div class="title">
        <h1>Luz</h1>
        <p>"Eres la razón por la que creo que las cosas<br>más bonitas también pueden ser reales."</p>
        <div class="divider"></div>
    </div>

    <div class="scene">
        <div class="ground-glow"></div>

        <svg style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);overflow:visible;width:min(560px,100vw);height:auto"
            width="560" height="540" viewBox="0 0 560 540" preserveAspectRatio="xMidYMax meet">
            <defs>
                <linearGradient id="potGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#1a0a2e"/>
                    <stop offset="40%" stop-color="#2d1050"/>
                    <stop offset="100%" stop-color="#120820"/>
                </linearGradient>
                <linearGradient id="potRimGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#4a2870"/>
                    <stop offset="50%" stop-color="#6a3a98"/>
                    <stop offset="100%" stop-color="#3a1e58"/>
                </linearGradient>
                <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#1a3a10"/>
                    <stop offset="50%" stop-color="#2e5c1a"/>
                    <stop offset="100%" stop-color="#1a3a10"/>
                </linearGradient>
                <linearGradient id="soilGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#18083a"/>
                    <stop offset="100%" stop-color="#0c0420"/>
                </linearGradient>

                <!-- Tulipán morado/lila - pétalo -->
                <radialGradient id="tulipPurple" cx="50%" cy="20%" r="80%">
                    <stop offset="0%" stop-color="#e8b8ff"/>
                    <stop offset="50%" stop-color="#b060e8"/>
                    <stop offset="100%" stop-color="#7020c0"/>
                </radialGradient>
                <!-- Tulipán rosa -->
                <radialGradient id="tulipPink" cx="50%" cy="20%" r="80%">
                    <stop offset="0%" stop-color="#ffb8e8"/>
                    <stop offset="50%" stop-color="#e860b0"/>
                    <stop offset="100%" stop-color="#c02080"/>
                </radialGradient>
                <!-- Tulipán lila claro -->
                <radialGradient id="tulipLavender" cx="50%" cy="20%" r="80%">
                    <stop offset="0%" stop-color="#f0d8ff"/>
                    <stop offset="50%" stop-color="#c890f8"/>
                    <stop offset="100%" stop-color="#9050d0"/>
                </radialGradient>

                <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="rgba(180,100,255,0.18)"/>
                    <stop offset="100%" stop-color="rgba(180,100,255,0)"/>
                </radialGradient>

                <!-- Interior del tulipán -->
                <radialGradient id="tulipInner" cx="50%" cy="80%" r="60%">
                    <stop offset="0%" stop-color="rgba(40,0,80,0.6)"/>
                    <stop offset="100%" stop-color="rgba(40,0,80,0)"/>
                </radialGradient>
            </defs>

            <!-- Maceta -->
            <polygon points="210,410 350,410 330,500 230,500" fill="url(#potGrad)" stroke="#4a2870" stroke-width="1.5"/>
            <rect x="200" y="402" width="160" height="14" rx="3" fill="url(#potRimGrad)"/>
            <ellipse cx="280" cy="407" rx="72" ry="9" fill="url(#soilGrad)" stroke="#2d1050" stroke-width="1"/>

            <!-- Tallos principales -->
            <path d="M280,430 C278,380 279,350 280,310 C281,270 280,250 280,205" stroke="url(#stemGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
            <path d="M275,425 C265,375 252,345 238,308 C226,275 218,255 205,218" stroke="url(#stemGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
            <path d="M285,425 C295,375 308,345 322,308 C334,275 342,255 355,218" stroke="url(#stemGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
            <path d="M277,428 C268,378 255,342 243,215" stroke="url(#stemGrad)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
            <path d="M283,428 C292,378 305,342 317,215" stroke="url(#stemGrad)" stroke-width="4.5" fill="none" stroke-linecap="round"/>

            <!-- Hojas -->
            <path d="M263,295 C245,282 236,265 248,250 C258,262 263,278 263,295Z" fill="#2a4a14" stroke="#3a6020" stroke-width="1"/>
            <path d="M252,338 C232,326 224,308 237,292 C248,304 254,320 252,338Z" fill="#223c10" stroke="#3a6020" stroke-width="1"/>
            <path d="M297,295 C315,282 324,265 312,250 C302,262 297,278 297,295Z" fill="#2a4a14" stroke="#3a6020" stroke-width="1"/>
            <path d="M308,338 C328,326 336,308 323,292 C312,304 306,320 308,338Z" fill="#223c10" stroke="#3a6020" stroke-width="1"/>

            <!-- Conectores tallos laterales -->
            <line x1="200" y1="228" x2="252" y2="428" stroke="url(#stemGrad)" stroke-width="3" stroke-linecap="round"/>
            <line x1="360" y1="228" x2="308" y2="428" stroke="url(#stemGrad)" stroke-width="3" stroke-linecap="round"/>

            <!-- Maceta al frente (overlay) -->
            <polygon points="210,410 350,410 330,500 230,500" fill="url(#potGrad)" stroke="#4a2870" stroke-width="1.5"/>
            <rect x="200" y="402" width="160" height="14" rx="3" fill="url(#potRimGrad)"/>

            <!-- Glows -->
            <ellipse cx="205" cy="220" rx="80" ry="80" fill="url(#glowPurple)"/>
            <ellipse cx="280" cy="195" rx="95" ry="95" fill="url(#glowPurple)"/>
            <ellipse cx="355" cy="220" rx="80" ry="80" fill="url(#glowPurple)"/>

            <!-- TULIPÁN IZQUIERDO (morado) -->
            <g style="animation:float 4s ease-in-out infinite">
                <g transform="translate(205,222)">
                    <!-- pétalos traseros -->
                    <path d="M-14,-10 C-20,-38 -14,-62 0,-68 C14,-62 20,-38 14,-10 Z" fill="url(#tulipPurple)" opacity="0.75"/>
                    <path d="M14,-10 C28,-30 38,-52 28,-66 C16,-60 8,-38 14,-10 Z" fill="url(#tulipPurple)" opacity="0.75"/>
                    <path d="M-14,-10 C-28,-30 -38,-52 -28,-66 C-16,-60 -8,-38 -14,-10 Z" fill="url(#tulipPurple)" opacity="0.75"/>
                    <!-- pétalos frontales -->
                    <path d="M-8,0 C-18,-28 -16,-56 0,-64 C16,-56 18,-28 8,0 Z" fill="url(#tulipPurple)"/>
                    <path d="M8,0 C22,-20 30,-48 20,-62 C10,-56 4,-28 8,0 Z" fill="url(#tulipPurple)"/>
                    <path d="M-8,0 C-22,-20 -30,-48 -20,-62 C-10,-56 -4,-28 -8,0 Z" fill="url(#tulipPurple)"/>
                    <!-- sombra interior -->
                    <ellipse cx="0" cy="-20" rx="12" ry="20" fill="url(#tulipInner)" opacity="0.5"/>
                </g>
            </g>

            <!-- TULIPÁN CENTRAL (lila, más grande) -->
            <g style="animation:floatCenter 4.5s ease-in-out infinite">
                <g transform="translate(280,195) scale(1.15)">
                    <path d="M-16,-12 C-24,-44 -16,-72 0,-80 C16,-72 24,-44 16,-12 Z" fill="url(#tulipLavender)" opacity="0.75"/>
                    <path d="M16,-12 C32,-36 44,-62 32,-78 C18,-70 10,-44 16,-12 Z" fill="url(#tulipLavender)" opacity="0.75"/>
                    <path d="M-16,-12 C-32,-36 -44,-62 -32,-78 C-18,-70 -10,-44 -16,-12 Z" fill="url(#tulipLavender)" opacity="0.75"/>
                    <path d="M-9,0 C-22,-32 -18,-66 0,-76 C18,-66 22,-32 9,0 Z" fill="url(#tulipLavender)"/>
                    <path d="M9,0 C26,-24 36,-56 24,-74 C12,-66 5,-34 9,0 Z" fill="url(#tulipLavender)"/>
                    <path d="M-9,0 C-26,-24 -36,-56 -24,-74 C-12,-66 -5,-34 -9,0 Z" fill="url(#tulipLavender)"/>
                    <ellipse cx="0" cy="-24" rx="14" ry="24" fill="url(#tulipInner)" opacity="0.45"/>
                </g>
            </g>

            <!-- TULIPÁN DERECHO (rosa) -->
            <g style="animation:float 3.8s ease-in-out infinite .4s">
                <g transform="translate(355,222)">
                    <path d="M-14,-10 C-20,-38 -14,-62 0,-68 C14,-62 20,-38 14,-10 Z" fill="url(#tulipPink)" opacity="0.75"/>
                    <path d="M14,-10 C28,-30 38,-52 28,-66 C16,-60 8,-38 14,-10 Z" fill="url(#tulipPink)" opacity="0.75"/>
                    <path d="M-14,-10 C-28,-30 -38,-52 -28,-66 C-16,-60 -8,-38 -14,-10 Z" fill="url(#tulipPink)" opacity="0.75"/>
                    <path d="M-8,0 C-18,-28 -16,-56 0,-64 C16,-56 18,-28 8,0 Z" fill="url(#tulipPink)"/>
                    <path d="M8,0 C22,-20 30,-48 20,-62 C10,-56 4,-28 8,0 Z" fill="url(#tulipPink)"/>
                    <path d="M-8,0 C-22,-20 -30,-48 -20,-62 C-10,-56 -4,-28 -8,0 Z" fill="url(#tulipPink)"/>
                    <ellipse cx="0" cy="-20" rx="12" ry="20" fill="url(#tulipInner)" opacity="0.5"/>
                </g>
            </g>

            <!-- TULIPÁN SECUNDARIO IZQUIERDO (morado pequeño) -->
            <g style="animation:float 4.2s ease-in-out infinite .2s">
                <g transform="translate(243,215) scale(0.82)">
                    <path d="M-12,-8 C-18,-32 -12,-54 0,-60 C12,-54 18,-32 12,-8 Z" fill="url(#tulipPurple)" opacity="0.7"/>
                    <path d="M12,-8 C24,-26 32,-46 22,-58 C12,-52 6,-30 12,-8 Z" fill="url(#tulipPurple)" opacity="0.7"/>
                    <path d="M-12,-8 C-24,-26 -32,-46 -22,-58 C-12,-52 -6,-30 -12,-8 Z" fill="url(#tulipPurple)" opacity="0.7"/>
                    <path d="M-7,0 C-16,-24 -14,-50 0,-58 C14,-50 16,-24 7,0 Z" fill="url(#tulipPurple)"/>
                    <path d="M7,0 C18,-18 26,-42 16,-56 C8,-50 2,-24 7,0 Z" fill="url(#tulipPurple)"/>
                    <path d="M-7,0 C-18,-18 -26,-42 -16,-56 C-8,-50 -2,-24 -7,0 Z" fill="url(#tulipPurple)"/>
                </g>
            </g>

            <!-- TULIPÁN SECUNDARIO DERECHO (rosa pequeño) -->
            <g style="animation:float 3.5s ease-in-out infinite .6s">
                <g transform="translate(317,215) scale(0.78)">
                    <path d="M-12,-8 C-18,-32 -12,-54 0,-60 C12,-54 18,-32 12,-8 Z" fill="url(#tulipPink)" opacity="0.7"/>
                    <path d="M12,-8 C24,-26 32,-46 22,-58 C12,-52 6,-30 12,-8 Z" fill="url(#tulipPink)" opacity="0.7"/>
                    <path d="M-12,-8 C-24,-26 -32,-46 -22,-58 C-12,-52 -6,-30 -12,-8 Z" fill="url(#tulipPink)" opacity="0.7"/>
                    <path d="M-7,0 C-16,-24 -14,-50 0,-58 C14,-50 16,-24 7,0 Z" fill="url(#tulipPink)"/>
                    <path d="M7,0 C18,-18 26,-42 16,-56 C8,-50 2,-24 7,0 Z" fill="url(#tulipPink)"/>
                    <path d="M-7,0 C-18,-18 -26,-42 -16,-56 C-8,-50 -2,-24 -7,0 Z" fill="url(#tulipPink)"/>
                </g>
            </g>

        </svg>
    </div>

    <canvas id="particles" style="position:absolute;inset:0;pointer-events:none;z-index:2"></canvas>
</div>

<script>
    const svg = document.querySelector('.scene svg');
    function updateViewBox() {
        if (window.innerWidth <= 600) {
            svg.setAttribute('viewBox', '60 140 440 400');
        } else {
            svg.setAttribute('viewBox', '0 0 560 540');
        }
    }
    updateViewBox();
    window.addEventListener('resize', updateViewBox);

    const starsEl = document.getElementById('stars');
    const starData = [
        {t:6,l:8,s:'big',d:3.2},{t:14,l:18,s:'sm',d:2.1},{t:5,l:28,s:'big',d:4},{t:22,l:35,s:'sm',d:1.8},
        {t:9,l:45,s:'sm',d:2.8},{t:17,l:55,s:'big',d:3.5},{t:7,l:65,s:'sm',d:2},{t:12,l:73,s:'big',d:4.2},
        {t:25,l:80,s:'sm',d:1.5},{t:19,l:88,s:'big',d:3},{t:3,l:92,s:'sm',d:2.6},{t:30,l:5,s:'sm',d:3.8},
        {t:38,l:22,s:'big',d:2.4},{t:44,l:42,s:'sm',d:4.5},{t:35,l:60,s:'sm',d:1.9},{t:42,l:78,s:'big',d:3.1},
        {t:50,l:90,s:'sm',d:2.2},{t:28,l:50,s:'big',d:3.7},{t:10,l:40,s:'sm',d:1.6},{t:16,l:58,s:'big',d:2.9}
    ];
    starData.forEach(s => {
        const el = document.createElement('span');
        el.className = 'star ' + s.s;
        el.style.cssText = `top:${s.t}%;left:${s.l}%;--d:${s.d}s;animation-delay:${(Math.random()*3).toFixed(1)}s`;
        starsEl.appendChild(el);
    });

    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight }
    resize();
    window.addEventListener('resize', resize);
    for (let i = 0; i < 30; i++) {
        particles.push({
            x: Math.random(), y: .5 + Math.random() * .5,
            vx: (Math.random() - .5) * .0003, vy: -Math.random() * .0004 - .0001,
            r: Math.random() * 1.8 + .4, a: Math.random() * .6 + .1,
            hue: Math.random() * 60 + 260
        });
    }
    function animParticles() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.a += .002;
            if (p.y < 0) { p.y = .85 + Math.random() * .15; p.x = .3 + Math.random() * .4 }
            ctx.beginPath();
            ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${p.hue},90%,78%,${Math.abs(Math.sin(p.a)) * .55})`;
            ctx.fill();
        });
        requestAnimationFrame(animParticles);
    }
    animParticles();
</script>
</body>
</html>
